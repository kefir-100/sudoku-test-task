<h2 mat-dialog-title>Start a new game?</h2>
<mat-dialog-content>Your current progress will be lost.</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onClickClose(false)">Cancel</button>
  <button mat-flat-button color="primary" (click)="onClickClose(true)">New Game</button>
</mat-dialog-actions>
